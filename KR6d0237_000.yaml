front:
  text: 梓施食通覽序詳夫檀施有三種焉一曰財施二曰法施三曰無畏施夫法食之施能兼三施而有焉歟其以飲食濟彼饑虗一也其施以呪食法隨食入二也其與法食已令彼等所有恐怖悉皆捨離解脫幽趣三也不特所施而於能施五果現臻二嚴當備夫法食之施亦兼二利而有焉歟諸佛之所稱揚羣賢之所褒述固無容擬議也但弗之察者往往有言吾敦乎本不騖乎末彼役志于施福者果何為也哉噫萬行有般若以為導則三輪空寂雖終日施奚病焉苟徒拘泥而墮斷滅之見則違道遠矣施食通覽者石芝法師曉公之所編也蓋公以嘗知其施食之法簡而易行約而成功乃取典籍之有涉于此者彚為此書使人人了然知其所自則公之仁慈之及物不其博哉豫幸得此書於京師一寓目不勝嘆賞遂采數本而訂其亥豕兼為和訓而梓之是欲施食之法益洋溢於不窮也此書之編其意良出于此善讀者信之篤行之誠則三施可成五果可臻二嚴可備而亦無負於曉公之所望矣時元祿辛未四年仲秋清旦湖東安養律寺沙門戒山謹識施食通覽并序四明石芝沙門宗曉編法食之施其利博哉非唯使彼脫幽塗生善道歸乎三寶成乎正覺亦使人近則現招五果遠則成就二嚴真自他兼濟之要津乃入佛勝地之妙道也余竊見遐方近處若緇若俗遵行此法者雖衆然昧厥由者亦復不少遂於披閲教典之次儻有關於施食者悉謄録之彚聚麕積不覺其多暇日銓次成帙因目之曰施食通覽而今之後或有睹於斯文者願興悲智之心益廣無相之施云爾嘉泰甲子中秋日宗曉序目録佛說救面然餓鬼陀羅尼神呪經出大藏羊字函佛說施甘露水陀羅尼呪并附施乳海水輪觀陀羅尼等佛說救拔焰口陀羅尼經序天竺沙門遵式佛說救拔焰口餓鬼陀羅尼經出大藏槐字函佛化曠野鬼神緣出大藏一字函佛化鬼子母緣出大藏別字函比丘乞食分施鬼畜出大藏草字函受食呪願偈二章南嶽思大禪師觀心食法天台智者大師出生圖紀孤山沙門智圓施食正名天竺沙門遵式施食法同前施食文同前施食法式同前施食觀想同前改祭修齊決疑頌并序同前施食須知霅川沙門仁嶽施餓鬼食文文忠公蘇軾施食放生文賢良陳舜俞崔伯易施食感驗出夷堅志士大夫施食文文惠公史浩水陸大齊靈跡記東川推官楊鍔水陸緣起長蘆沙門宗蹟水陸法像贊一十六首文忠公蘇軾修水陸葬枯骨疏同前初入道場敘建水陸意出楊鍔水陸儀宣白召請水陸上下堂同前水陸齊儀文後序同前斛前召請啓白文歐陽文忠公宿採石聞鬼聲佛印禪師加持水陸感驗誦破地獄偈感驗誦破地獄呪感驗附録
