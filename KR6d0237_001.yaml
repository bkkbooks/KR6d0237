body:
  text: 佛説救面然餓鬼陀羅尼神呪經出羊字函大唐三藏法師實叉難陀奉詔譯爾時世尊在迦毗羅城尼俱律那僧伽藍所與諸比丘并諸菩薩無數衆生周匝圍繞而為説法爾時阿難獨居淨處一心繫念即於其夜三更之後見一餓鬼名曰面然住阿難前白阿難言却後三日汝命將盡即便生此餓鬼之中是時阿難聞此語已心生惶怖問餓鬼言我此災禍作何方計得免斯苦爾時餓鬼報阿難言汝於晨朝若能布施百千那由他恆河沙數餓鬼并百千婆羅門及仙人等以摩伽陀國斗各施一斗飲食并及為我供養三寶汝得增壽令我離於餓鬼之苦得生天上阿難見此面然餓鬼身形羸瘦枯燋極醜面上火然其咽如針頭髮蓬亂毛爪長利身如負重又聞如是不順之語甚大驚怖身毛皆竪即從座起疾至佛所五體投地頂禮佛足身心顫栗而白佛言救我世尊救我善逝過此三日命將終盡昨夜見一面然餓鬼而語我言汝於三日必當命盡生餓鬼中我即問言以何方計得免斯苦餓鬼答言汝若能施百千那由他恆河沙數餓鬼及百千婆羅門并諸仙等飲食汝得增壽世尊我今云何得免此苦爾時世尊告阿難言汝今勿怖有異方便令汝得施如是餓鬼諸婆羅門及仙等食勿生憂惱佛言阿難有陀羅尼名曰一切德光無量威力若有誦此陀羅尼者即成已施俱胝那由他百千恆河沙數餓鬼及六十八俱胝那由他百千婆羅門并諸仙等前各有摩伽他斗四斛九斗飲食佛告阿難我於前世曾為婆羅門時於觀世音菩薩及世間自在德力如來所受於陀羅尼我當以此陀羅尼方便得具足施於無量無數餓鬼及婆羅門并仙等食以我施諸餓鬼食故捨離此身得生天上阿難汝今受持此陀羅尼當自護身即説呪曰那麼薩縛無可反下同此但他揭多去聲呼縛路枳帝一唵三上聲呼下同此跋鞞揭反下同此囉三跋囉二虎𤙖二合三佛言阿難若欲作此施食法者先取飯食安置淨盤器中誦此陀羅尼呪呪食七遍於門內立展臂戶外置盤淨地彈指七下作此施已於其四方有百千俱胝那由他恆河沙數餓鬼於一一餓鬼前各有摩伽陀斗四斛九斗飲食如是鬼等遍皆飽滿是諸餓鬼喫此食已悉捨鬼身盡得生天復言阿難若比丘比丘尼優婆塞優婆夷若能常誦此陀羅尼并奉飲食即為具足無量功德命得延長即成供養百千俱胝如來功德顏色鮮潔威德強記一切非人步多鬼等夜叉羅剎并諸餓鬼皆畏是人心不忍見是人即為成就具足大力勤進復言阿難若欲施婆羅門及仙食者當取飲食滿置鉢中誦此陀羅尼呪呪食七遍瀉流水中具足奉獻無量俱胝百千恆河沙數婆羅門及諸仙等如天飲食其婆羅門并仙人等喫此食已諸根具足圓滿吉祥各發其願讚歎施人其施食人心得清淨而便疾證梵天威德常修淨行具足成就供養百千俱胝恆河沙數如來功德於諸怨敵而常得勝若比丘比丘尼優婆塞優婆夷若欲供養一切三寶應當具辦香華飲食誦此陀羅尼呪呪所施食及香華等二十一遍供養三寶此善男子善女人等具足成就諸天妙供及無上供尊重讚歎一切如來剎土三寶諸佛憶念稱揚讚歎諸天擁護佛言汝去阿難當自護身并及廣為諸衆生説令諸衆生成就具足無量功德所生之世常值百千俱胝諸佛佛説救面然餓鬼陀羅尼神呪經終準施食須知及蜀本瑜伽密教皆云有甘露水呪出實叉譯救面然經後及撿藏本皆不載之往往後來寫刻脫去矣今謹依密教録附經後庶補其缺也彼仍有乳海呪一字水輪呪并偈句等併以傳流或有所用則不為無考焉佛説施甘露水陀羅尼捧水盂誦呪七遍灑之下二呪亦然南無引素嚕皤耶一怛他揭多去聲呼之耶二怛你他二合三唵引四素嚕素嚕五鉢囉二合素嚕鉢囉二合素嚕六莎呵七此法最殊勝大悲心上生流演妙伽陀甘露難思法一滴泛清涼皆是毗盧藏佛説施乳海陀羅尼曩謨引三滿多沒馱喃鍐準大藏經音無犯切下同次為一切幽顯有情入毗盧遮那如來一字水輪觀令諸有情恣飲十斛甘露法水陀羅尼曰唵引鍐鍐鍐鍐此是毗盧教甘露解脫門以大祕密言加持微妙食法喜禪悅食遍滿於法界一切鬼神衆願得酥陀味永除飢渴想即證無生地甘露王如來讚無為子楊傑述諸天以名藥投于大海中摩以妙寶山造成甘露味嘗者延壽命而無夭橫苦如來施法食充滿大千界令諸渴愛者永斷生死本稽首甘露王一食遍一切佛説救拔焰口陀羅尼經序宋錢塘天竺寺沙門遵式撰事有簡而易從者物有微而大濟者功有倍而召速者三者斯經備焉且陳一器之食呪之七反鳴指以施之呪亦不過數句此其易從也徹窮泉包九野塵沙莫數焰口之鬼皆甘嗜實腹此其大濟也夫報應之理統論三世其業廣而醇者謂之順現即感延齡此其召速也法王之制坦然明白可舉而行矣夫一摶之食一勺之水有用無匱聞之者不能不惑苟推功神呪理歸不測又何惑焉夫龍一鱗蟲耳得蹄涔之水散之六虗以為洪流況至聖至良之神呪窮法界之至變者也焦腹矩口沈幽動劫仰天無訴非慈仁惻惻為心者展臂一惠雖一餐其可得乎大哉博施濟衆真斯謂也何必云堯舜病諸且能恕己之飢渴於彼之飢渴雖勞亦為況簡而易從也經曰如供百千俱胝佛者非直顯其功大抑亦戒令慎重而後施之必也重心則現招五果五果者一曰壽二曰色三曰力四曰辨五曰安昭然在文不復委引信夫一粒充於彼五福隆於此其猶影響焉詎有勤善聞斯而不遷者也一經凡兩譯此本八十三行一字合千四百十三言即三藏不空所翻也但加四如來及四真言為異用者存略任意官坊俗務不暇廣行直誦變食一呪於理已足實叉譯本但一呪而已事備施食正名不復煩敘云也佛説救拔焰口餓鬼陀羅尼經出槐字函唐大興善寺三藏沙門大廣智不空奉詔譯爾時世尊在迦毗羅城尼拘律那僧伽藍所與諸比丘并諸菩薩無數衆會前後圍繞而為説法爾時阿難獨居靜處念所受法即於其夜三更已後見一餓鬼名曰焰口其形醜陋身體枯瘦口中火然咽如針鋒頭髮髼亂爪牙長利甚可怖畏住阿難前白阿難言却後三日汝命將盡即便生此餓鬼之中阿難聞此語已心生惶怖問餓鬼言若我死後生餓鬼者行何方便得免斯苦爾時餓鬼白阿難曰汝於明日若能布施百千那由他恆河沙數餓鬼并百千婆羅門仙等以摩伽陀國所用之斛各施一斛飲食并及為我供養三寶汝得增壽令我離於餓鬼之苦得生天上阿難見此焰口餓鬼身形嬴瘦枯焦極醜口中火然咽如針鋒頭髮髼亂爪牙長利又聞如是不順之語甚大驚怖身毛皆竪即從座起疾至佛所五體投地頂禮佛足身體戰栗而白佛言願救我苦所以者何我住靜處念所受法見焰口餓鬼而語我言汝過三日必當命盡生餓鬼中我即問言云何令我得免斯苦餓鬼答言汝今若能施於百千那由他恆河沙數餓鬼及百千婆羅門仙等種種飲食汝得增壽世尊我今云何能辨若干餓鬼仙人等食爾時世尊告阿難言汝今勿怖我有方便令汝能施若干百千恆河沙餓鬼及諸婆羅門仙等種種飲食勿生憂惱佛告阿難有陀羅尼名曰無量威德自在光明勝妙力若有誦此陀羅尼者即能充足俱胝那由他百千恆河沙數餓鬼及婆羅門仙等上妙飲食如是等衆乃至一一皆得摩伽陀國所用之斛七七斛食阿難我於前世作婆羅門於觀自在菩薩及世間自在威德如來所受比陀羅尼故能散施與無量餓鬼及諸仙等種種飲食令諸餓鬼解脫苦身得生天上阿難汝今受持福德壽命皆得增長爾時世尊即為阿難説陀羅尼曰曩謨薩𭌯怛他引蘖跢引一𭌯路引枳帝二唵引三三去跋羅三跋羅吽引四佛告阿難若有善男子善女人欲求長壽福德增榮速能滿足檀波羅蜜每於晨朝及一切時悉無障礙取一淨器盛以淨水置少飲及諸餅飯等以右手按器誦前陀羅尼滿七遍然障稱四如來名號南謨多寶如來曩謨婆去誐𭌯帝一鉢囉二合部引哆囉怛曩二合野怛他引蘖跢引野二由稱多寶如來名號加持故能破一切諸鬼多生已來慳吝惡業罪障消滅即得福德圓滿南謨妙色身如來曩謨婆誐𭌯帝一素嚕二合播引迦野引怛他引誐跢野二由稱妙色身如來名號加持故能破諸鬼醜陋惡形即得色相具足南謨廣博身如來曩謨引婆誐𭌯帝一尾補囉誐引怛囉二合引野怛他引蘖跢引野二由稱廣博身如來名號加持故能令諸鬼咽喉寬大所施之食恣意充飽南謨離怖畏如來曩謨婆去誐𭌯帝一阿上婆去孕迦囉引野怛他去蘖跢引野二由稱離怖畏如來名號加持故能令諸鬼一切恐怖悉皆除滅離餓鬼趣佛告阿難若族姓子等稱四如來名號加持已彈指七遍取於食器於淨地上展臂瀉之作此施已於其四方有百千那由他恆河沙數餓鬼前各各有摩伽陀國七七斛食受此食已悉皆飽滿是諸餓鬼等悉捨鬼身生於天上阿難若有比丘比丘尼優婆塞優婆夷常以此真言及四如來名號加持飲食施諸餓鬼便能具足無量福德則同供養百千俱胝如來功德等無差別壽命延長增益色力善根具足一切非人夜叉羅剎諸惡鬼神不敢侵害又能成就無量福德壽命若欲施諸婆羅門仙等以淨飲食滿盛一器即以前真言加持二七遍投於淨流水中如是作已即為以天仙美妙飲食供養百千俱胝恆河沙數婆羅門仙彼諸仙人得加持食故以明威德各各成就根本所願諸善功德各各同時發誓願言願施食人壽命廷長色力安樂又令其人心所見聞正解清淨具足成就梵天威德行梵天行又同供養百千恆河沙如來功德一切怨讎不能侵害若比丘比丘尼優婆塞優婆夷若欲供養佛法僧寶應以香華及淨飲食以前真言加持二十一遍奉獻三寶是善男子及善女人則成以天肴膳上味奉獻供養滿十方世界佛法僧寶亦為讚歎勸請隨喜功德恆為諸佛憶念稱讚諸天善神恆來擁護即為滿足檀波羅蜜阿難汝隨我語如法修行廣宣流布令諸衆生普得見聞獲無量福是名救焰口餓鬼及苦衆生陀羅尼經以是名字汝當奉持一切大衆及阿難等聞佛説已一心信受歡喜奉行佛説救焰口餓鬼陀羅尼經終佛化曠野鬼神緣出一字函大涅槃經北本第十六卷佛言善男子如我一時遊彼曠野聚落在叢樹下有一鬼神即名曠野純食肉血多殺衆生復於其聚日食一人善男子我於爾時為彼鬼神廣説法要然彼暴惡愚癡無智不受教法我即化身為大力鬼動其宮殿令不安所彼鬼于時將其眷屬出其宮殿欲來拒逆鬼見我時即失心念惶怖躃地迷悶斷絶猶如死人我以慈愍手摩其身即還起坐作如是言快哉今日還得身命是大神王具大威德有慈愍心赦我𠎝咎即於我所生善信心我即還復如來之身復更為説種種法要令彼鬼神受不殺戒即於是日曠野村中有一長者次應當死村人已送付彼鬼神鬼神得已即以施我我既受已便為長者更立名字名手長者爾時彼鬼即白我言世尊我及眷屬唯仰血肉以自存活今以戒故當云何活我即答言從今當敕聲聞弟子隨有修行佛法之處悉當令其施汝飲食善男子以是因緣為諸比丘制如是戒汝等從今常當施彼曠野鬼食若有住處不能施者當知是輩非我弟子即是天魔徒黨眷屬善男子如來為欲調伏衆生故示如是種種方便非故令彼生怖畏也佛化鬼子母緣出別字函鼻奈耶雜事律三十卷佛在王舍大城城內有藥叉神名曰娑多常護摩竭提國人民娑多娶妻時北方健陀羅國復有藥叉名半遮羅亦復娶妻二共聚會念無以重歡時娑多曰我等沒後所有子孫可作指腹之親遮羅唯之時娑多妻忽生一女容貌端嚴為之立字名曰歡喜半遮之妻後生一男號半支迦娑多又生一男名娑多山娑多亡山為家主歡喜謂弟曰我今欲食王城男女山曰我父於此常護人民爾以云何生此惡念弟知姊意難回即報半遮羅為婚既婚之後歡喜謂夫半支迦曰我欲食王城男女迦曰彼皆是汝家族他來侵害尚欲相護寧為酷虐歡喜生子次第至於五百其最小者名曰愛兒五百成立母恃子勢欲行非法夫勸不從時歡喜便於王城往來所有男女次第取食人民痛惱白王王即敕令四門守捉亦被偷去王城災起即敕處處祭祀災橫不除爾時天神即於夢中告諸人曰汝諸男女皆被歡喜藥叉所噉當往告佛時諸人曰此鬼噉我男女則是惡賊何名歡喜因此競呼為訶梨底衆往白佛佛即明旦持鉢入城到藥叉所值渠出行佛即以鉢覆其愛兒如來威力令衆不見母歸不見愛兒便即顛狂內外尋覓直至四海四洲地獄天宮亦復不見時多聞天言曰汝不須憂宜速歸佛彼當示汝歡喜即回遙見世尊告言失子佛言汝有幾子答言五百佛言五百失一如是苦惱況他一子母曰願以示誨佛言可受我戒則便得見愛兒母曰我依佛教佛即舉鉢母乃得見愛兒即從佛求受三歸五學處不殺生等受已白言我今與子何所食噉佛言我敕聲聞弟子每於食次出衆生食并於行末設食一盤呼汝等名字施之若有江河諸鬼神等宜應食者皆悉運心令其飽滿佛説是已比丘白佛言訶梨底母先世作何行業而乃如是佛言過去王城有牧牛妻懷妊體重爾時無佛乃獨覺化世獨覺出城衆設大會有五百人嚴持供養路中值見娠婦告言可來儛蹈婦起欲心揚眉儛戲因是墮胎婦便憂惱乃以酪漿買得五百菴羅果持供獨覺即發願言願我當來生王舍城食諸男女由彼邪願今故噉人精氣時訶梨底既受歸戒返被諸藥叉神作災即將諸子施與衆僧諸子見僧乞食即化作小兒隨後而去王城女人見已抱持彼便隱沒諸女問曰此是誰子比丘答言訶梨底子諸女人曰此乃怨家毒害之子耶比丘言彼已捨惡但為藥叉作災持以施我也諸女作念彼能捨惡以子奉佛我何不施耶遂競捨男女與僧僧不受前往白佛佛言應受受已不為守護佛言應以故袈裟片繫其項上而為守護後時父母將財來贖僧不受佛言應受時六羣比丘要索全價佛言不應索價但隨彼意比丘乞食當分為四分出草字函寶雲經佛言善男子菩薩當具足十法行乞摶食謂發心利益諸衆生故次第行乞無渴愛求已自知足性樂分施無貪婪想於所乞食自知限量趣向助道巧摶善根遠離摶想善男子菩薩見諸衆生貧窮困苦功德微薄不種善根為利彼故行詣乞食若入城郭聚落應善攝念於諸境界勿令馳騁威儀庠序諸根不動視地七尺低頭而行若入富家亦不多求充足是日一食而已勿妨法事遠離諸惡毀謗等處勿渴愛求勿強迫求亦不瞋恨隨宜所得已自知足持鉢而還安置衣鉢而洗手足於所食者分為四分一分與同學一分與貧窮一分與鬼畜一分而自食如是取食無貪著心無悕望心莫為過少莫為過多若少不能行道若多睡眠身重等受食呪願偈南嶽思大禪師師隨自意三昧云凡所得食應云此食色香味上供十方佛中奉諸賢聖下及六道品等施無差別隨感皆飽滿令今施主得無量波羅蜜又云念食色香如栴檀風一時普熏十方世界凡聖有感各得上味六道聞香發菩提心於食能生六波羅蜜及以三行觀心食法天台智者大師既敷座已聽維那進止鳴鐘後斂手供養一體三寶遍十方界施作佛事次出生飯稱施六道即表六波羅蜜然後受此食夫食者衆生之外命若不入觀即潤生死若能知入觀分別生死有邊無邊不問分衛與清衆淨食皆須作觀觀之者自恐此身內舊食皆是無明煩惱潤益生死今之所食皆是般若想於舊食從毛孔次第而出食既出已心路即開食今新食照諸暗滅成於般若故淨名云於食等者於法亦等是為明證以此食故成般若食能養法身法身得立即得解脫是為三德照此食者非新非故而有舊食之故而有新食之新是名為假求故不得求新不得畢竟空寂名之為空觀食者自那可食為新既無新食那可得食食者而不離舊食養身而新食重益因緣和合不可前後分別名之為中只中即假空只空即中假只假即空中不可思議名為中道又淨名云非有煩惱非離煩惱非入定意非起定意是名食法也出生圖紀并序孤山沙門智圓述儒禮食必祭其先君子有事不忘本也釋氏之出生具云出衆生食蓋祭曠野鬼神及鬼子母沙門用心憫異類也不忘本仁也憫異類慈也兩者同出而異名今觀後學鮮測厥由遂使出生事乖謹潔於檀越家則或雜以所棄處衆堂則盤器汙雜因圖其形容紀其事迹以示來者且祭神如神在享于克誠在儒尚然況稟佛制今衆居宜以淨器聚斂安此像前良久施飛走鱗介之屬檀越家當於僧食畢取其生飯併著一器供彼形像然後散之然律亦許二食時先送食供養寄歸傳亦云復於行末安食一盤以供呵利帝母也若或先供則衆僧不須各出切恐於時未安今宜各出然後聚而供之既人別用心則咸思佛制庶幾上士勤而行之所謂賢者之祭必受其福也涅槃南本第十五云佛遊曠野聚落有一鬼神即以曠野為名食肉殺生復於其聚日食一人佛為説法愚不受教佛即化身大力鬼動其宮殿彼鬼出宮拒逆見佛所化躃地悶絶佛以慈手摩身即還起坐作如是言快哉今日還得身命是大神王赦我愆咎佛現本身復為説法令彼鬼神受不殺戒是日曠野村中有一長者次應當死鬼神得已即以施佛佛為立字名手長者鬼白佛言我及眷屬唯仰血肉以自存活今已受戒當何資立佛即答言從今當敕聲聞弟子隨有修行佛法之處悉當令其施汝飲食以是因緣為諸比丘制如是戒汝等從今常當施彼曠野鬼神食若有住處不能施者當知是輩非我弟子即是天魔徒黨眷屬寄歸傳第一云施主初置聖僧供次乃行食以奉僧衆復於行末安食一盤以供呵利帝母其母先身因事發願食王舍城所有兒童遂受藥叉身生五百兒日餐王舍城男女佛遂藏其稚子名愛兒母遂覓之佛告曰汝子五百一尚見憐況復餘人但一二乎佛因化之令受五戒乃請佛曰我兒五百今何食焉佛言我令苾芻等隨所寺院住處日日常設祭食令汝等充餐故西方諸寺每於門屋處或在食廚邊塑畫母形抱一兒子於膝下或五或三以表其像每日於前盛陳供食母乃四天王部衆也大豐勢力其有疾病無兒息者饗禱焉皆悉遂願詳如律説神州先有名鬼子母焉今詳此方佛寺皆於門壁畫二神神後一女蓋其遺像既二俱受祭故併畫之或有立居士像者蓋手長者也西壁即嚝野之身東壁即佛所化者今明受供唯圖曠野之像焉施食正名天竺沙門遵式述施食一經凡兩譯共三名一曰救面然一曰救拔焰口一直云施餓鬼食今吳越諸寺多置別院有題榜水陸者所以取諸仙致食於流水鬼致食於淨地之謂也世言施水陸無主孤魂者理出誘俗言不涉教有題斛食者所以取諸摩提偉器之度顯變之大非器食于其中也有題冥道者所以取諸鬼類別他趣也天其冥乎人其冥乎畜其冥乎夫燕以蟲粒自充牛羊以水草而足泥黎咀銅鐵而不暇提婆飲甘露而有餘生生之方既殊服味之品萬計唯其鬼黨伺人廟食故大慈誨以密教詛少令多而博濟之至若山海之仙莫貴匪人莫高匪天不我類焉且能顯晦饗夫粒食于以求之但小出鬼之上梁天監天下止殺乃用相似佛法設六道之祭代江東淫祀蔬食菜羮免我犧羊今之承之既非彝訓不能無差故牟尼有言曰人死祀之魂為鬼則歆其食矣他趣亡諸又諸無疑聖弟子曰六趣各有自爾之力唯鬼能變食耳詩不云乎不愆不忘率由舊章故大聖名之必可言也言之必可行也過此已往則未知所裁施食法同前先和會經文者經既兩譯略有異同實叉譯云若欲施婆羅門及仙等食婆羅門及仙乃分二類經文似誤也不空譯云施婆羅門仙不云及仙此文似正若作二類婆羅門是人不合同鬼施食也實叉呪仙食七遍與鬼同不空云二七遍二七為正實叉云餓鬼得摩伽他斗四斛九斗飲食不空云七七斛食譯者不同不須和會據理但取飽滿為度經云施食若晨朝及一切時悉無障礙準毗羅三昧經云早起諸天食日中三世佛食日西畜生食日暮鬼神食與此經如何和會釋曰應有多意且作一解毗羅據理定説此經隨時不定説何者餓鬼飢急苦若倒懸得食便施何俟終日故云一切無礙也若天仙及佛須依毗羅定説過中之後決不可以飲食雜果供養也經不説人者準人道既貴合在中前食故人有夜食不節者自同鬼畜耳又實叉唯用一呪不空加四如來名等今且依實叉貴易行故一呪之力能兼一切不俟其諸又有甘露經及一小卷者並失譯不可用次正示方法者經云若欲作此施食法者先取一淨器盛以淨水置少飲食及諸餅飯以右手按器呪滿七遍云云呪竟彈指七下展臂將食器瀉淨地上方法訖實叉譯云於門內立展臂戶外置盤淨地不云瀉也作此施已於其四方有百千俱胝那由他恆河沙數餓鬼一一鬼前各有摩伽陀國七七斛食受此食已悉皆飽滿是諸餓鬼悉捨鬼身生於天上其施婆羅門仙及供養三寶尋經易見當誦呪時更加觀想既為盡善想器中飲食色味無盡遍施不匱如淨名室中一盂香飯充足衆會無所乏少亦如涅槃純陀少飯充滿雙林大衆不多不少信此陀羅尼不可思議飲食色香亦不可思議衆生心亦不可思議夫何惑哉三勸修者此經真長生之術也阿難尊者延三日必死之命滿百年具壽之康五果見臻二嚴當備五果者色力辨安壽二嚴者福惠也實在乎施一摶之食也經云若常以此真言加持飲食施餓鬼者則同供養百千俱胝如來功德等無差別壽命延長壽也顏色鮮白色也具足大力力也威德強記辨也一切非人夜叉羅剎不敢侵害安也又能成就無量福德壽命二嚴也前五果中已有壽命理無重出信知此中以慧為命五果二嚴在文炳然若此大矣哉能於少頃作大佛事能以摶食作大施會常生梵天乃至成佛一日既爾何況一月何況一年何況一生豈有智人聞而不信信而不行者乎施食文同前以銅器盛飲食淨水灌之當臨食器面東而立起慈悲心稱三寶名三説及大慈觀世音菩薩三説破餓鬼障稱竟以左手擎食右指按食器心存目注誦陀羅尼云云誦七遍竟彈指七下然後展手垂之起無畏施良久即以食瀉之置淨地上合掌呪祝云我沙門某甲今誦無量威德自在光明勝妙力陀羅尼加持飲食普施餓鬼之衆惟願面然鬼王大權勝士慈善熏心普攝無量無邊恆河沙數餓鬼之衆悉來我所受我所施無遮無礙清淨法食如經所説各各皆得摩伽陀國所用之斛七七斛食一一充飽無所乏少頓皆消滅長劫飢渴倒懸之苦身心歡喜發菩提心應時即得心樂三昧疾捨鬼身生佛淨土速圓種智廣度衆生我此施食功德如世尊言即與供養無量百千俱胝恆河沙諸佛正等無異願以此福回向法界莊嚴菩提願共衆生同得圓滿檀波羅蜜遠離一切生死飢渴速得究竟菩提涅槃二無上果當施衆生無盡法食施食法式同前施食方法一依經作尋文可見不勞別出若欲口自呪祝者隨己智力都不須者祇是以左手擎食右手按器呪之七遍彈指七下以食瀉置淨地即足也但起施心想此水食由呪力故無窮無盡其外四如來名并名下四真言能用即用或公務私緣及存長久祇消呪食一呪誦至七遍一切已足實叉譯本祇是一呪無四如來等具載施食正名行此法者願依古式猶恐未諳特為書之沙門遵式重示南無十方佛南無十方法南無十方僧南無大慈觀世音菩薩并三稱神呪加持淨飲食普施河沙衆鬼神願皆飽滿捨慳心即脫幽冥生善道歸依三寶學菩提究竟得成無上覺功德無邊盡未來一切衆生同法食曩謨薩𭌯怛他引蘖跢引一𭌯路引枳帝二唵三三去跋羅三跋羅吽引四誦七遍南無多寶如來南無妙色身如來南無廣博身如來南無離怖畏如來並三稱汝等鬼神衆我今施汝供此食遍十方一切鬼神共願以此功德普及於一切我等與衆生皆共成佛道言已彈指七下行無畏施然後以食瀉淨地上想諸鬼神食之施食觀想答崔育材職方所問同前先略述大意次作觀想先述大意者飲食具色香味觸法五塵唯缺聲耳於五塵中味塵為主味依色住亦可觀色為境大品云色中無味相凡夫不應著色中無離相二乘不應離即是非味非離顯色中道法界何法不備是故一色具一切色亦具聲香等一切諸塵及一切法一切心隨感而施何法不現淨名經云譬如諸天共寶器食隨其福德飯色有異止觀大意妙境云一一塵中一切塵一一塵中一切心一一心中一切剎等云云釋論云菩薩呵色見色實相到色彼岸即是見色中道若分別色具種種相即是見色俗諦俗即是空即是見色真諦亦是見色三諦既了色即是法界即是實相即是中道三諦等即應了色即是陀羅尼當知所施飲食色之與味即陀羅尼體也一食出無量食等即陀羅尼用也經云此陀羅尼名無量威德自在光明勝妙力此復以三德為義無量威德自在解脫德也光明般若德也勝妙法身德也力是總結力用也自非法身勝妙之用安能一餐充彼巨億萬數塵沙之衆乎問若我即是陀羅尼者何故更須呪乎答實爾諸佛聖人證此一塵法界故能以自在之力稱性而用何俟更呪淨名取一鉢香飯遍飽三萬二千無所乏少豈藉呪乎三乘賢聖食此飯者悉入正位或增道損生其香乃消豈非具一切法也但衆生在迷於理既惑於事亦礙於自在法中而自桎梏如水為冰安責水用故聖人方便密説此法名陀羅尼令誦以呪之呪句與色味法性相應能令鬼神見食無量經云如人得一斤石汁變千斤銅為金物性相感故也問施食正名中云六道各有自爾之力唯鬼能變食者何不直施其食任其自變何假呪乎答鬼有多種不必一例略出三類一者無財鬼由無福德不得飲食故二者少財鬼少得淨妙飲食故三者多財鬼多得淨妙飲食所此三類復各有三種初無財鬼三者一炬口鬼謂火矩炎熾常從口出二者針咽鬼謂腹大如山咽如針孔今經中正為此二種傍兼一切三臭口鬼謂口中腐臭自惡受苦二少財鬼亦三種一針毛鬼毛如針利行便自刺二臭毛鬼毛利如刺自拔受苦三大癭鬼咽垂大癭自決噉膿三多財鬼三種者一得棄鬼謂常得祭祀所棄食故二得失鬼謂常得巷陌所遺食故三勢力鬼謂夜叉羅剎毗舍闍等所受富樂類於人天但為惡道所攝所言能變食者即是第三多財中三種鬼也又三中前二則劣後一為勝亦只能及於自類不能有所廣濟今呪力所變能令九種鬼中平等皆得上妙飲食無有差別又呪食者名為法食法隨食入如服良藥能差重病身康受樂經云捨餓鬼身得生天上即此意也第二作觀想者行人既了諸法無非法界一多無礙復信陀羅尼力不可思議至施食處安祥而立先起慈心憫彼飢渴我今將欲大施先想其處廣博嚴淨其地平正作一施場能容受無量餓鬼之衆次想食器隨我呪力如摩伽陀國大斛之量滿中甘美飲食如天甘露一器為無量器滿其施場畟塞周遍一一鬼前皆有我身誦呪彈指慈心展臂授器施與隨意滿足想呪之聲普聞一切彈指之聲驚覺幽沈之處一切餓鬼從四方來無所障礙現前受食令想心明了猶同眼見然後不移此想心一一為其説法或稱佛號或呪願等隨意作竟而退問如上觀想據何處文作答此經雖文略不説據餘呪部印契觀想隨呪句句而作不可一念差舛此呪亦令以手按器呪之七反呪已彈指七下非全不作法今加觀想彌益其功問作此路布次第觀想準何處作答準天台三種觀中歷事觀作既云歷事隨彼事相而設觀想故無常科今準天台供養三寶運香華觀想大旨一同也又南嶽禪師食觀偈云此食色香如栴檀風一時普熏十方世界凡聖有感各得上味六道聞香發菩提心於食能生六波羅蜜及以三行請詳此觀何俟致疑又淨名經云以一食施一切供養諸佛及衆賢聖然後可食豈非食觀問變食由呪力何用觀乎答觀扶於呪彌益其美又呪是他力觀是自力但呪而無觀譬如盲者使人作大施會但信他語云得食不得食等自終不見若加觀想如有目者使人作大施會一一眼見不由他語呪如使人觀如眼見金剛般若云若菩薩心住於法而行布施如人入暗則無所見若不住法而行布施如人有目日光明照見種種色今無觀者只作事行如人入暗也觀稱法界無住即是無住行施其福譬如十方虗空不可思量也凡作一切佛事乃至獻一華一香皆能作觀者不滯生死一一流入薩婆若海中少戒少施皆成佛果良由茲矣改祭修齋決疑頌并序同前近見多改祭祀競修齋福斷肉止殺正信念佛甚為希有其間或未知損益者妄生破毀便言在俗祭祀為先或云齋戒不能救急見蔬食念佛我但持心聞善惡因緣來世誰受於是善根未深者被斯惑亂多退初心今為斷疑引經明證并作偈頌令易憶持依此誠言莫信邪説然世人疑慮是故無量今但從要略書十頌第一疑有鬼無鬼能禍能福耶釋曰經説六道鬼居其一何疑無鬼耶阿含經云一切所居舍宅街巷道陌屠坊市肆及諸山冢皆有鬼神但不能利害於人譬喻經云天下鬼神不能活人不能殺人亦不能令人富貴貧窮但隨人衰劣而作怪崇希望祭祀若求福必定無也世俗不知空被誑惑殺生造惡頌曰鬼神隨處有諂誑世間人祭祀都無福空增殺業因第二疑現見世人病患祭祀獲安何言無福耶釋曰世人貧窮災福皆屬因果非鬼能為是鬼為福蓋從邪信所招諂求而得辨正論云舊鬼教新鬼興怪求食初往二家轉磨上碓其家事佛不信是怪俱云善神助我盡日舂磨數斛米麥都不得食後入邪信之家令白狗上空中而行其家大怪殺狗設食因茲得飽當知信佛不要信怪設使見怪但專念佛其怪自息頌曰正信天龍護邪神豈奈何但知常念佛災怪自消磨第三疑家眷死後祭祀得食不得食耶釋曰若墮餓鬼祭祀之時或有得食若在焰口之鬼雖祭亦不得食阿含經云若為死人布施祭祀者若死入餓鬼中得食若生餘處必不得食也六道萬品受報差殊父母死亡豈皆作鬼世人不識一向祭祀甚無理也頌曰人死隨前業升沈六道殊如何純祭祀須道世人愚第四疑祭祀之法廣在禮經天子七廟諸侯五廟大夫卿士至於庶人皆同祭祀圓丘方澤上下神明國之常典云何勸令斷祭奈太傷國風乎釋曰祭祀出其俗典斷祭據其佛經俗典則未逃殺害佛經則唯尚慈悲殺害則報在三塗慈悲則果成萬德以善改惡導淺令深佛度衆生無不皆爾今人既信佛教須修佛慈不可更殺衆生稱佛弟子況復時俗不獨祭先靡神不宗實謂淫祀不修明德唯事殺生可悲之深略談難盡故昔梁武帝敕天下斷祭止殺蓋遵佛教豈獨今日也幸有齋福正好競修足可利於存亡亦免傷於物命何勞苦執祀典經乎頌曰剎牛慚禴祭黍稷本非馨齋誦真明德何勞執禮經第五疑祭祀之家及彼師巫得何罪報耶釋曰如毗尼律中説迦雷陀夷身證羅漢被婆羅門婦殺之因過去曾為祭主今廟祀是也有五百商人共宰一羊同來乞願殺羊祭祀已俱墮地獄世世已來常被羊殺其五百人亦因彼婦被波斯匿王所殺且五百人共殺一命并其祀主今證聖果受報未盡何況一人殺多物命又晉時巴丘縣有師巫姓舒名禮為人祭祀死墮熱殺地獄舉體焦爛還魂自説又寶藏經廣説祭祀之報不能備引頌曰殺他還自殺影響逐形聲鬼飽都無福空招墮火坑第六疑今若改祭自古已來還有報驗耶釋曰此事感驗非一今為略引晉有張應本事俗神鼓舞淫祀咸和八年妻病禱祭罄竭妻曰今病日困求鬼無益乞作佛事應便許之請僧曇鎧明當設齋夜夢神人責應不早嚴淨見鎧隨後曰始欲發心未可責之眠覺連夜秉火設座因茲廢神事佛其妻病愈後張應身死墮鑊湯地獄因前改祭善神來救遂得解脫還魂自説又顏氏家訓云梁世江陵劉氏以賣鱓羮為業後生一兒頭是鱓自頸已下方為人耳又王克為永嘉郡守有人餉羊集賓欲宴而羊繩解來投一客先跪兩拜便入衣中此客竟不言之固無救請須臾宰羊為肉先行至客一臠入口便下皮肉周行遍體痛楚號叫方便説之遂作羊鳴而死梁孝元在江州有人為望蔡縣令經劉敬躬亂縣廨被焚寄寺而住民將牛酒作禮縣令以牛繫剎柱屏除佛像鋪設牀座於堂上接賓未殺之頃牛解徑來至階而拜縣令大笑命左右宰之飲噉醉飽便臥簷下稍醒而覺體癢𭺗搔疹因爾成白癩病經十許年死又梁世有人常以雞卵白和沐云使髮光每沐輒破二三十枚臨死髮中但聞啾啾數千雞雛聲楚痛篤病而死又顏氏家訓云齊國有一家甚豪侈非手殺牛則噉之不美年三十許病篤大見牛來舉體如被刀刺叫呼而終江陵高偉隨吾入齊凡數年向幽州淀中捕魚後病每見羣魚齧之而死又宋有陳安居父母信釋教旦夕齋誦有伯事神神影滿宅後伯死絶嗣父令安居紹伯家舍便廢淫祀其神遂禍安居三年篤病執志不回常誓曰若使我殺生祭祀寧生自臠割四體終不殺命安居身亡府君歎曰此人事佛大德人也壽當九十三歲遂放令還其伯殺害祭祀欺誑百姓罪宜墮苦此例非一不能盡書頌曰回邪生正信臭草出栴檀逢難須堅固安居志好攀第七疑改祭之後忽遇災禍既已捨神求誰救護耶釋曰但每日一心稱念觀世音菩薩一切災難一切病痛牢獄賊盜水火風雷虎狼毒蛇蟲藥呪詛皆不能害請觀音經中佛敕諸大天龍藥叉一切威猛神將晝夜守護受持觀世音菩薩名者諸惡鬼神尚不能以惡眼視之況復加害梁朝有沙門名僧融為一家毀除神影勸受五戒被其鬼將領鬼兵來責融融專念觀音一聲未絶忽見神人以金剛杵擬其鬼衆一時走散身上甲胄化為灰粉又僧融曾勸夫婦二人受戒後為賊所纍夫遂逃避其婦繫獄融教至心稱觀世音更無餘法婦人依語感枷杻三木自然釋脫獄門自開因是免難其事非一不可備論頌曰專持菩薩號八部護君身急難隨聲應唯除不信人第八疑自來殺生祭祀所有罪業作何功德而得消滅耶釋曰但各書寫供養金光明經回此功德與彼怨家將來無對如張居道殺生忽被怨家取去冥關許寫此經怨家解脫居道放還但將所贖經文安家中供養每日精勤稱此經題名目及三寶名自然家中眷屬安穩財帛增多一切天龍皆來護宅一切災橫邪鬼悉不敢害請至信此言終不虗也頌曰法寶真良藥衆生自不嘗書持并供養世世上天堂第九疑凡修齋福并讀誦經典當回向家宅何等神明凡有幾位耶釋曰回向天龍善神閻羅冥官山川境邑一切神明家中土地神護宅善神并先代亡靈墮在惡道者除此以外其餘家中雜雜鬼神并不須事之亦不須回向此等皆非汝家所事悉名邪諂切信此言頌曰作福常回施天龍善鬼神威光常覆護使汝免災迍第十疑既不許祭祀或家眷死亡墮在鬼趣云何施其飲食耶釋曰經有方法今當普示請各依行如此施食得福無量如供養百千俱胝諸佛功德正等每日將淨器盛一器淨飯唯除瓷器及鐵器不得用經中銅器最上其器不須至大即是盂器之屬也每日至暮時以淨水灌其飯上令滿以左手擎之以右手舉頭指於器中誦呪七遍已彈指七下將飯傾於淨地不得近桃李樹下傾已而作是言我今普施一切餓鬼依草附木孤魂滯魄勝劣鬼神清淨法食無遮無礙隨意飽滿或能更為稱三寶名等其呪如經中此施法食不獨令家先眷屬得食普令一切餓鬼飽滿利益甚深普勸若僧若俗若男若女盡行此法頌曰鬼道常飢渴當生憐憫心能蠲口中食佛讚福田深施食須知霅川沙門仁嶽述釋教施鬼神食者緣起有三一者涅槃經梵行品云佛遊曠野聚落有一鬼神即名曠野純食血肉多殺衆生復於其聚落日食一人佛於爾時為説法要令彼受不殺戒是日村中有一長者當死送與鬼神其神得已即以施佛佛為立字名手長者鬼白佛言我及眷屬唯仰血肉以自存活今已受戒當何資身佛言從今當敕聲聞弟子隨有修行之處悉施汝食以是因緣為諸比丘制如是戒若有住處不能施者當知是輩非我弟子即是天魔徒黨眷屬二者寄歸傳受齋戒軌則章云呵利帝母先身因事發願食王城所有兒女因其邪願遂受藥叉之身生五百子日餐王城男女諸人白佛佛為藏其稚子明日鬼母遍覓至於佛所方得佛告之曰汝子五百一尚見憐況餘人但一二而已佛即化之令受五戒因請佛曰我子五百今何食焉佛言我令苾芻等隨所住處日日設食令汝充餐故西方諸寺每於門屋處或在食厨邊塑畫母形抱一兒子於膝下或五或三以表其像每日於前盛陳供食其母乃四天王部衆大豐勢力若有疾病或無了息咸饗禱焉皆隨所願廣如律説三者按焰口經云此經兩譯一實叉難陀譯名救面然二不空譯名救拔焰口佛在尼拘律那僧伽籃爾時阿難獨居靜室念所受法即於其夜見一餓鬼名曰焰口白阿難言卻後三日汝命將盡生餓鬼中阿難聞此心生惶怖問餓鬼言行何方便得免此苦鬼曰汝於明日若能布施百千那由陀恆河沙數餓鬼并婆羅門仙等以摩伽陀國所用之斛各施一斛飲食及為我供養三寶汝得增壽令我離苦得生天上阿難以事白佛我今云何能辨若干餓鬼仙人飲食佛言有陀羅尼名無量威德自在光明勝妙力若有誦者即能充足餓鬼及仙上妙飲食皆得摩伽陀國七七斛食乃至云若有善男子善女人欲求長壽福德增榮速能滿足檀波羅蜜每於晨朝及一切時悉無障礙取一淨器盛以淨水置少飲及諸餅飯等以右手按器誦呪七遍加持已彈指七下於淨地上展臂瀉之不空譯呪後令稱四如來名實叉譯則無而有施水呪名甘露陀羅尼當取水一掬亦誦呪七遍散於空中其水一滴變成十斛甘露一切餓鬼悉得飽滿兩經呪詞併列之然霅川此文列二呪今此施食通覽既引二經於前諸呪已具故於此中略去議曰所録施食因起三種不同斯乃善權示迹俾後世修梵行者依而行之須知二意一者佛戒令施違則得罪出家弟子日日須施如為曠野鬼神并鬼子母之類今出生飯者是二者佛敕令施順則得福此教在家之人至心所辨如為焰口及婆羅門仙今之施斛者是或有為亡人以食祭六道者未見教文荊溪禪師云此是梁武帝見江東人多淫祀以相似佛法權宜替之按婆沙論云若因祭祀唯鬼神得問為勝耶為劣耶答非勝非劣若勝天人應得若劣地獄應得以其鬼道有自爾之力故今更明之施曠野鬼神鬼子母食亦同祭祀非勝非劣之類也既有自爾之力故經中無加持之法如阿含經云鬼能變少為多即其事焉若焰口經令誦呪者以餓鬼趣劣惡業至重須假法力除障及變成上味故余觀今時僧伽藍俗舍齋次出生食令傍人取斂安淨器散陸地上或川澤間唯飼鱗介飛走之族復有畫阿難施餓鬼食并婆羅門仙衆傳寫救焰口呪七如來名於圖之下以食供養而已相承既久往往出家之流都忘佛制本為曠野鬼神鬼子母之事也今請四衆凡出生食僧既出已併著一處先安衆僧座末或清淨處置一卓子上盛水一器焚香供養之寄歸傳云西方施主請僧齋日初置聖僧供次行僧食復於行末安食一盤以供呵利帝母據此不須人人各自出生今順此土常儀故各出生也齋畢知法者取食與水誦呪彈指呼名運想所謂呵利帝母曠野鬼神焰口等一切餓鬼就淨潔處散食於地灑水於空然其食不妨與飛走等類噉之或問施曠野鬼神鬼子母等食今用焰口呪者何耶對曰鬼神既有自爾之力循業所現能得幾何儻以呪法則微助其遍供佛尚用真言況此幽塗豈無密益問將出生食令施焰口等其事得否答經文既云每日晨朝及一切時悉無障礙何獨夜勞斛食方施餓鬼是則均一餐之少分充三類之飢虗所施甚微厥利尤博聖言不妄切莫疑心或有云若是米之屬方可出生若蔬果者物類則不食也余謂不爾左傳云苟有明信澗溪沼沚之毛蘋蘩薀藻之菜可薦於鬼神那忽以物類而為其妨耶昔孤山有出生圖紀天竺有施食正名圖紀則專示誡呵正名則唯存勸意今總撮樞要庶可兼通所冀在家出家仰遵佛制常行法食之惠也施餓鬼食文文忠公蘇軾鬼趣多餓仁者當念濟之宜以錫或鐵為斛斗受一二升量每晨取炊熟淨飯滿斛蓋覆著淨處至夜重餾令熱取透并淨水一盞能不食酒肉固大善不能當以淨水漱口誦淨口業真言七遍燒香呪願云奉佛弟子某甲夜具斛食淨水供養一切鬼神又誦般若心經三卷破地獄偈三遍便呪願云願此飯此水承佛慈力下承某甲福力願力變少為多變粗為細變垢為淨願諸佛子食此水飯頓除飢渴諸障消滅離苦得樂究竟成佛言已以水掬飯三分之一散置屋上餘者不妨以食貧人水即散灑之要在發平等慈悲無求心耳施食放生文賢良陳舜俞惟一沙界中微塵國土一千聚落萬億伽藍於伽藍中有一沙門以佛誕辰集諸善侶以一盂食召彼餓鬼水陸空等隨意摶食聚諸畜生羽毛鱗甲類釋復本處及為説法施清淨戒而作佛事時衆會中見一居士謂沙門言聚食於食真汝慳貪取生於生真汝殺害彼餓鬼等以慳貪故彼畜生等以殺害故不應殺彼而隨彼墮時彼沙門謂居士言汝無以此取捨生死虗妄諸相較我真實所作佛事所以者何若有化人及化餓鬼諸畜生類化以食施及令放生一切世間取捨生死不離是相以實不食變少分食作無數食一切餓鬼無不能食以實不生令無盡生一切畜生無不能生於意云何一切取捨非取捨故一切生死非生死故尚不見法何況能説及諸解脫者尚不見戒何況能持及諸説者爾時沙門作是語已一切餓鬼水陸空等皆得飽滿一切畜生羽毛鱗甲類皆得自在於是作記以書之崔學士施食感驗見夷堅志崔公度字伯易自少好施食每施時常以尊勝黃幡遍插食上率以夜半為節非有大故未嘗廢為館職日嘗飯於親故家至終夕方歸道沿蔡河有酒家簾未下馬過觸之驚逸崔墜地迷而不知似醉夢間見一婦人至曰此崔學士也急解帕巾裹其首又招其徒曰此乃施食崔學士今有難不可不救俄有十餘人應聲併來皆婦人也與之按摩崔覺稍蘇卒勉上馬送歸家人方聞其墜馬但怪暮夜安得有人裹頭崔倣佛能道之亦不測其何人及解其帕視之乃二紅纈有血慘色中實碎紙皆所插黃幡也應手灰飛方知是鬼物耳士大夫施食文會稽郡王史浩我此飲食不為商販不為工作不為農耕不為緇黃之受施何所從來何所從得當知此乃天地鬼神發生護助之功君相祖先化育卑遺之德蓋天地不發生鬼神不護助則陰陽愆伏旱潦頻仍君相不化育則征誅困迫盜賊敓𭤑廩粟不繼祖先不卑遺則吾安得有此尺寸之土又安得有吾身而食此土哉此四者飲食之根本不可不知也又況食方萌蘖畢歲始成耕耨乃苗收穫乃稻簸揚乃穀磨礲乃米於是臼杵去粳粃淘汰蠲砂礫始得以登庖僮僕供樵蘇婢媵勤炊煮始得以登器嗚呼此食之至吾前不知作勞者幾何人耶是故吾之一飽未嘗不思報天地鬼神君相祖先之功德又未嘗不思念下人之勞苦今舉斯心普伸愧謝願從今日不限華夷同躋豐樂無有飢羸莩餓菜色愁歎之人然後以此清滌香粳之薦敢用致告山川陵谷城邑郊墟有祀無祀之威靈有知無知之魂魄冀聞斯語享于克誠或砉飲以求前宜雍容而就列斟酌飽滿求離迷津正直聰明永依聖道某年月日謹告吾儒飲食必祭與浮圖施食同義然浮圖有文世已盛行吾儒此法或未盡用豈為無文以表出之耶余雖以是補其遺蓋不敢覬人之必信後有君子從事於終食無違者當有取於斯焉鄭峯真隱史浩書水陸大齋靈迹記東川推官楊鍔大梁武帝治化清時道利寰中兵戈永息唯崇佛理寢處優間草履葛巾布被莞席精持齋戒濟恤含生悲念四恩心緣三有晝夜焚誦靡暫停時遂感聖賢同扶國忽於中夜夢一高僧神清貌古雪頂厖眉前白帝言六道四生受苦無量世有水陸廣大冥齋普濟含生利樂幽顯諸功德中最為殊勝宜以羞設帝既覺悟詰旦升朝躬臨寶殿即以夢水陸之事首問大臣及諸沙門悉無知者唯志公奏曰但乞陛下廣尋經教必有因緣帝依奏即遣迎大藏經論置于法雲殿積日披覽頗究端由及詳阿難遇焦面鬼王因地建立平等斛食乃創製儀文三年乃就其間所得事類具出一十一本經論其文既備心猶有疑一慮聖意罔周二恐凡情未愜遂乃再嚴廣內特建道場俯及夜分親臨法席跪膝致敬手捧儀文顧謂侍臣息除燈燭悉令暗冥帝乃虔誠焚香發願敘其感夢撰此齋文儻若理契聖凡利兼幽顯願禮拜起處道場燈燭不熱自明或體式未周利益無狀所止燈燭悉暗不明言訖投地作禮禮已燈燭盡明帝睹之神情大悅於是欲營此齋乃召志公以問當就何處志公曰宜以深山幽谷中羞設最奇貧道竊睹潤州澤心寺即金山寺舊名也江上一峯水面千里潭月雙照雲天四垂堪會神靈境通幽顯時天監四年二月十五日夜帝召僧祐律師宣文鳳舸親臨法會興于水陸大齋饒益幽冥普資群彚自後陳隋兩朝其文堙墜至大唐咸亨中有僧可宗為陰府所攝至泰山府君所將加楚毒遂亟告曰某是西京法海寺英禪師之弟子也府君聞已乃不加罪即遣捷疾往取英公英公忽如夢寐至府君所府君問曰可宗是師弟子否英公曰然時可宗遂得免罪以歸府君乃命英公演法事已復遣送還後過旬日英公獨坐方丈見一異人巍然冠冕足不履地前來告曰弟子向於府君所偶見禪師知師拯救之慈故來奉謁有少悰悃願聽所言世有水陸大齋可以利沾幽品若非吾師無能興設英曰當何營辦異人曰其法式齋文是梁武帝所集今大覺寺有吳僧義濟得之久置巾箱殆欲隳蠧願師往取為作津梁苟釋狴牢敢不知報英公許之尋詣大覺寺訪其義濟果得其文遂剋日於山北寺依法崇奉修設既畢復見異人與徒屬十數輩咸來謝曰弟子即秦莊襄王也又指其屬曰此范睢穰侯白起王翦張儀陳軫等皆其臣也咸坐本罪久處陰司大夜冥冥無所依告今蒙吾師設齋并為懺罪弟子甚衆皆承善力將生人間恐世異國殊不得再見故來相謝今有少物在弟子墓下願以為贈弟子之墓在通化門外者是也英公曰我聞西漢赤眉作亂墓悉已開發此物豈可存耶襄王曰弟子葬時深藏其物人所不見矣英公曰但貧道貴於知足雖有珍寶亦何用也願王等從此已往各悟夙因永離業界清升善道此貧道之所祝也言訖而隱英公既因其事彌加精固遂與吳僧常設此齋其靈感異應殆不可勝紀自爾流傳於天下凡植福種德之徒莫不遵行之時皇宋熙寧四年二月一日東川楊鍔字正臣謹記平江府靈巖山秀峯寺住持傳法賜紫覺海大師法宗睹此靈迹異事碣舊在鎮江府金山龍遊寺因改宮祠又復遭爇故無所存恐世不傳遂依古本命工刊石當山以示萬世靈感云爾時皇宋宣和七年六月望日謹題水陸緣起長蘆沙門宗賾詳夫水陸會者上則供養法界諸佛諸位菩薩緣覺聲聞明王八部婆羅門仙次則供養梵王帝釋二十八天盡空宿曜一切尊神下則供養五嶽河海大地龍神往古人倫阿修羅衆冥官眷屬地獄衆生幽魂滯魄無主無依諸鬼神衆法界旁生六道中有四聖六凡普通供養俱承如來祕密神呪功德法食故外則資身增長色力內則資神增長福慧由是未發菩提心者因此水陸勝會發菩提心未脫苦輪者因此得不退轉未成佛道者因此水陸勝會得成佛道今之供一佛齋一僧施一貧勸一善尚有無限功德何況普通供養十方三寶六道萬靈豈止自利一身獨超三界亦乃恩霑九族福被幽明等濟羣生同成佛道可謂無央無數無量無邊不可思議功德大海矣所以江淮兩浙川廣福建水陸佛事今古盛行或保慶平安而不設水陸則人以為不善追資尊長而不設水陸則人以為不孝濟拔卑幼而不設水陸則人以為不慈由是富者獨力營辦貧者共財修設感應事迹不可具述恐此方之人或未知本末今具水陸緣起于後昔者阿難獨居靜處於中夜時見一餓鬼名曰面然白阿難曰汝後三日生我趣中能於百千那由他恆河沙餓鬼并百千婆羅門仙各施一斗飲食并為我供養三寶汝得增壽我得生天阿難白佛求免斯苦世尊為説一切德光無量威德力大陀羅尼出救面然餓鬼經此是水陸因緣最初根本然未有水陸之名也梁天監初二月十五日夜武帝夢一神僧告曰六道四生受大苦惱何不為作水陸大齋而救拔之帝問沙門咸無知者唯志公勸帝廣尋經典必有因緣乃取藏經置法雲殿躬自披覽創造儀文三年乃成楊鍔云梁武齋儀相應者則有華嚴經寶積經涅槃經大明神呪經大圓覺經十輪經佛頂經面然經施甘露水經蘇悉地經帝建道場於夜分時執捧儀文悉停燈燭而白佛曰若此儀文理協聖凡利兼水陸願禮拜起處所止燈燭不爇自明或體式未詳利益無狀所止燈燭悉暗如初言訖投地一禮初起燈燭盡明再禮宮殿震動三禮諸天雨華天監四年二月十五日於金山寺依儀文修設帝親臨地席詔祐律師宣文可謂利洽幽明澤及飛走矣周隋兩代此文不傳至唐咸亨中西京法海寺英禪師一日方丈獨坐有異人衣冠甚偉足不履地來謁英公曰弟子知有六道水陸齋可以利益幽明自梁武歿後因循不行今大覺寺有吳僧義濟得此儀文久在篋笥殆欲蠧損願吾師往求以來月十五日於山北寺如法修設苟釋狴牢敢不知報英公許之異人乃去英公尋詣大覺寺果有吳僧義濟得儀文以歸即以所期日於山北寺親臨道場修設既畢其日曛暮向者異人與十數輩來謝英公曰弟子即秦莊襄王也又指其徒曰此范雎穰侯白起王翦張儀陳軫皆秦臣也咸坐本罪幽囚陰府大夜冥冥無能救護昔梁武帝於金山寺設此齋時前代紂王之臣皆免所苦弟子爾時亦暫息苦然以獄情未決不得出離今蒙吾師設齋弟子與此輩并列國諸侯衆等皆乘善力將生人間慮世異國殊故此來謝言訖遂滅自是儀文布行天下作大利益此是東川楊鍔水陸儀所載本朝東川楊鍔祖述舊規製儀文三卷行於蜀中最為近古然江淮所用并京洛所行皆後人踵事增華以崇其法至於津濟一也宗賾向於紹聖三年夏因托諸家所集刪補詳定勒為四卷粗為完文普勸四衆依法崇修利益有情咸登覺岸水陸法像贊并序文忠公蘇軾蓋聞淨名之屬饜萬口寶積之蓋遍覆大千若知法界本造於心則雖凡夫皆具此理在昔梁武皇帝始作水陸道場以一十六名盡三千界用狹而施博事約而理詳後生莫知隨世增廣若使一二而悉數雖至千萬而靡周唯我蜀人頗存古法觀其像設猶有典刑虔召請於三時分上下者八位但能起一念於慈悲之上自然撫四海於俯仰之間軾敬發願心具嚴繪事而大檀越張侯致敬禮樂聞其事共結勝緣請法雲寺法涌禪師善本善擇其徒修營此會永為無礙之施同守不刊之儀軾拜手稽首各為之贊凡十有六篇上堂八位第一佛陀耶衆謂此為佛是事理障謂此非佛是斷滅相事理既融斷滅亦空佛自現前如日之中第二達摩耶衆以意為根是謂法塵以佛為體是謂法身風止浪靜非別有水放為江河匯為沼沚第三僧伽耶衆佛既強名法亦非真神而明之存乎其人惟佛法僧非三非一如雲出雨如水現日第四大菩薩衆神智無方解脫無礙以何因緣得大自在障盡願滿反于自然無始以來亡者復存第五大辟支佛衆現無佛處修第二乘如日入時膏火為燈我説二乘如應病藥敬禮辟支即大圓覺第六大阿羅漢衆大不可知山隨線移小入無間澡身軍持我雖不能能設此供知一切法具此妙用第七五通神仙衆孰云飛仙高舉違世湛然神凝物不疵癘為同為異本自無同契我無生長生之宗第八護法天龍衆外道壞法如刀截風壞者既妄護者亦空偉茲龍神威而不怒示有四支佛之禦侮下堂八位第一官僚吏從衆至難者君至憂者臣以衆生故現宰官身以難為易以憂為樂樂兼萬人禍倍衆惡第二三界諸天衆苦極則修樂極則流禍福無窮糾纏相求遂超欲色至非非相不如一念真發無上第三阿修羅王衆正念淳想則為飛行毫𨤲之差遂墮戰爭以此為道穴胸隕首是真作家當師子吼第四人道衆地獄天宮同一念頃涅槃生死同一法性抱寶號窮鑽穴索空今夕何夕當選大雄第五地獄道衆汝一念起業火熾然非人燔汝而汝自燔觀法界性起滅電速唯知心造是破地獄第六餓鬼道衆説食無味涎流妄咽真食無火中虗妄見美從妄生惡亦幻成知幻即離既飽且寧第七旁生道衆欲人不知心則有負此念未成角尾已具集我道場一洗濯之盡未來劫愧者勿為第八六道外者衆陋劣之極蕩於眇冥胎卵溼化莫從而生聞吾法音飆超電動如夢覺人不復見夢修水陸葬枯骨疏同前右伏以諸佛衆生皆具大圓覺天官地獄同在一塵中是故惡念才萌便淪苦海善根瞥起已證法身要在攝心易同反掌竊見惠州太守右丞議郎詹君範與在州官吏舉行朝典破官錢葬失所暴骨數百軀既掩覆其形該復安存其魂識使歸泉壤別受後身軾目睹勝緣輒隨喜事以佛慈悲大願力以我廣大平等心遵釋迦之遺文修地藏之本願起焦面之教法設梁武之科儀伏願諸佛子等乘此良因離諸苦趣沐浴法水悟罪垢之本空鼓舞梵音知道場之無礙三歸已畢莫起邪心一飽之餘永無飢火以戒定慧滅貪瞋癡勿眷戀於殘骸共逍遙於淨土伏惟三寶俯賜證明初入道場敘建水陸意出楊鍔水陸儀原夫無遮水陸大齋者遵釋迦文之垂教奉梁武帝之科儀世間大慈人中上供於此可以修菩薩行於此可以建如來心宜當屏絶外緣端持正念第一須發菩提心以為道場當念此心本來湛寂與諸佛同但以煩惱所障愛網所纏遂使諸佛成道我等在迷只於今日今時便須覺悟發菩提心譬如蓮華初生淤泥華一出時垢不能著以是事故當發菩提心以為道場也第二須發廣大心以為法會當念此心自無分別與虗空等徒以蔽於無明礙於有欲起吾我見生怨親想遂使如來滅度我方受生他界有佛我不能見只於今日今時即須懺洗發廣大心譬如月不離天凡有水處影無不現以此因緣當以廣大身心而為法會第三須發大願心以為供養當念無邊衆生未曾得度我今當度一切衆生未得果證我今令證六道四生衆生當津濟之使周十方三世聖賢當體事之使遍只於今日今時發如是大願心而為供養法無盡故供養亦無盡也第四須發大悲心以為法財當念衆生造諸惡業以惡業故轉入惡道一入惡道無有休息若人欲我代諸衆生受諸苦惱我則不答復於其中勸化發心令彼回心向善只於今日今時又須發起此大悲心而為法施施一切衆生離苦得樂也既能堅發此四種大心則知此會不同他會乃是如來最勝無遮無礙大解脫門是故我今修為水陸冥場大齋以集無量無邊功德也今則當入法會正緣先為檀那合道場人及法界幽顯靈聰依怙聖教教四種廣大身心有真言云云宣白召請上堂八位聖衆同前蓋聞大雄出現所以覆護衆生妙法軌持所以度脫一切作希有事開大慈門視于四衆如象王回演乎一音作師子吼不起於寶蓮華座普化十方常放於玉毫相光遍照六道布慈雲於法界沃甘露於羣生人中衆聖之王世間大慈之父于夜則有弟子某惟念自從曠劫受佛大恩乃至今生聞佛正教幸三寶之普覆嗟六道之漂流望佛如浮木之龜何由可值顧身有繫衣之寶不自覺知捨身受身從苦入苦今欲導之以解脫之路進之以方便之門唯佛哀憐滿我志願是以特獻微妙之蔬饌普陳希有之香華虔慤無過精誠有在以故我今奉為施主殷勤禮請上堂八位聖衆伏惟迃降請佛陀耶衆一心歸命禮請真法性海妙報化身擁萬德之莊嚴廓十方而自在超諸名相了非三世之異同接彼塵勞普為羣生而隱顯慈光無量悲願難窮巍巍大海涌須彌耿耿衆星依皎月南無無盡虗空遍法界一切常住佛陀耶衆惟願不違本際平等慈熏俯降道場受乎供養請達摩耶衆一心歸命禮請性天萬像法海千波開毗盧廣大之義門照實際幽深之寶藏三車載物同超火宅之鄉八教應機盡入帝珠之網洞明權實示有筌蹄咸稱最上大福田是謂無邊真法施南無無盡虗空遍法界一切常住達摩耶衆請僧伽耶衆一心歸命禮請六和清淨一性圓明依戒律以嚴身具慈忍而攝物海傾談辨妙宣衆聖之法門月映禪心高露千機之正眼一塵無染萬行不違頂圓三昧祕珠明身挂九支靈草秀南無無盡虗空遍法界一切常住僧伽耶衆請大菩薩衆一心歸命禮請發弘誓願慕大菩提進六位之階差體一真之平等慈悲喜捨了無覺照之機出入死生不墮根塵之相補陀雲秀兜率風清寶華瓔珞共嚴身性海光明常利物南無無盡虗空遍法界一切常住大菩薩摩訶薩衆請大辟支佛衆一心歸命禮請以緣而覺絶世而修常獨住於山林初無取於言説鹿車運載脫塵勞於十二有支麟角超升發觀行於四十四智真空密照妙定孤圓雖於無佛世出興唯以中乘根取證南無無盡虗空遍法界一切常住辟支迦羅衆請大阿羅漢衆一心歸命禮請慧根迥脫定境高明速超三界之苦輪深證單空之妙理不受後有如明鏡之絶塵具足神通似明珠之現像位分四果名滿十方人間天上總歸依一千家能感應南無無盡虗空遍法界一切常住大阿羅漢衆請五通神仙衆一心歸命奉請身心離欲德行過人慕煙霞清淨之居住山海杳冥之際飄飄鶴馭隨月露以光寒冉冉霓裳逐天風而香散妙稱無漏獨取長生火分龍虎見神丹波動鯨鼇騰祕殿南無無盡虗空遍法界一切常住五通神仙衆請護法天龍衆一心歸命奉請積諸福德具大威神已登解脫之門敬護如來之教衣冠照映莫非善力之資生眷屬莊嚴豈受塵勞之愛染常參佛會降伏怨魔寶劒高輝般若光旌旗秀發金剛焰南無無盡虗空遍法界一切常住解脫門護法天龍衆宣白召請下堂八位聖凡原夫神道不遠虔懇須知聖力非遙禱祈必應或彈指斯須之際回旋倐忽之間或作雨形瑞色共輕雲之混雜或隨風勢信財與馱馬之飄颻今則豈色融融祥雲靄靄敢希聖駕允副凡心特伸邀請請官僚吏從衆楊鍔儀文祇有召請名銜至各及眷屬自餘以餘文補之一心奉請遍法界中往古今來一切官僚吏從衆皇王帝主百辟千官萬類羣分各及眷屬黎元以君上為所依官府以黎元為統攝由來率土盡屬王民故梁武之儀文立官僚之褥位善緣宿構勝報今逢抱文武兼備之才處富貴兩全之地九州四海皆歸化育之中萬姓四民盡入旌麾之上與奪由己舉動任情既勢去以時來故形亡而報轉愁魂黯黯長劫何依幽趣冥冥棲身無地如是官僚吏從並願承三寶力仗祕密言降臨道場受此無遮廣大供養辟必益切君也褥而蜀切氈也請三界諸天衆一心奉請遍法界中一切諸天衆欲界色界無色界中天主天王各及眷屬報居六欲夙因五戒十善之修上升九天安住八定四禪之位身雖有漏樂且無窮巍巍而宮殿隨身奕奕而光明照體八萬四千劫壽勝報時賖二十五有輪回升沈何已五衰相現一枕夢殘俄從宮殿之中奄入杳冥之境如是天道衆並願請阿修羅道衆一心奉請遍法界中一切阿修羅衆三頭六臂五趣四生海底山間各及眷屬前修善惡今報差殊負貢高陵下之心起嫉妒猜疑之行既專粗暴遂受醜形或項佩於多頭或肩生於數臂身如碧澱髮似金丹現大身而高等須彌山示小質而竄入藕絲竅與帝釋戰處雖莫能勝於如來輪下因已歸降冀收忿怒之胸懷庶使惡心而調伏如是修羅部衆並願澱音殿請人道衆一心奉請遍法界中一切人道衆尊卑貴賤中國邊方異狀殊形各及眷屬曩行五戒今報九流既為萬物之靈故預三才之列或超五道而至八定或著五欲而墜三塗並由身口為緣遂致升沈異路聲香味觸淫泆驕奢塵塵皆失於本心念念常存於妄想百年易失不思聲色之本空一夢難留盡入輪回之境界如是人道部衆並願請餓鬼道衆一心奉請遍法界中一切餓鬼道衆焦面火口巨首微咽渴惱針毛各及眷屬肇自七情來從十惡九類分別於正理論三般總示於瑜伽宗阿難見者曰面然目連睹之名華報鐵圍山畔論百億之何窮殑伽河邊舉恆沙而不盡莫不咽喉針細肢節火然骨鳴若破車之聲腹大似敗壺之牀怨甘漿之莫及痛熱惱之煎熬色力飢虗形骸醜惡如是餓鬼部衆一切飢渭衆生並願請畜生道衆一心奉請遍法界中一切畜生道衆毛羣羽族水陛飛沈巢穴微軀各及眷屬同居三界共在四生如塵若沙不可勝數莫不排空走野升天躍淵胎卵溼化之所生山林川澤之所聚或多足而無足或匾毛而混毛或有知而無知或小質而大質飛霜削木遽罹羅網以哀鳴急浪翻空難免梁之張捕怨絶刀砧之上魂飛湯火之中如是畜生部衆並願音戶取魚器請地獄道衆一心奉請遍法界中一切地獄道衆五無間獄十重罪入八熱八寒各及眷屬名標地獄總號泥犁鐵城高廣則無量無邊罪器彌多則可驚可怖種類區分而具有五百隔子枉受生死而一日八萬四千鑊湯爐炭之煎熬麋軀爛骨劒樹刀山之峻聳刺眼剚心輪輕治重而隨業昭彰拂石芥城而何時休息如是地獄部衆一切內外受苦衆生並願刺七逆切剚側吏切請六道外者衆一心奉請遍法界中一切六道外者衆或自三界而乍墮或從五趣以方來既涉升降之兩楹遂歷去來之中陰罔罔像像杳杳冥冥或上升而頭向天宮或下墜而首歸地府或橫趍於南北或足向於東西陋劣匪堪形相奚既飲食甘漿而莫覩吸風飲露以充飢素無毫善莊嚴故受如斯果報今則冤親等濟幽顯咸資如是六道外者中陰衆生並願水陸齋儀文後序同前按蕭氏建無遮齋其儀甚簡今所行者皆後人踵事增華以崇其法至於津濟一也竊尋蕭意蓋超三界之外已入聖地者上八位該焉走三界之內未出苦輪者下八位備焉已入聖地者靡不供養未出苦輪者靡不薦拔此所以為無遮也然大地一切本與諸佛同源諸佛如來自無衆生別處但緣起為妄真暗成愚坐與諸聖隔為異道斯文者敷演正教申明本緣開示其覺悟之機歸趣于解脫之法使參法會者了見大地無有一物不成佛者然後為得也凡齋以控帶江山依據林薄為勝地月望為佳日先期三日以淨水置佛前晝夜持呪想水成甘露以灑法食即三藏也臨壇宣文典其佛事即法師也以音聲屬和梵唄間作即歌讚也捧爐對聖冥運願力即檀越也故檀越必勤其精意精意然後能致其感法師必選其高行行高然後能尊其教三藏必堅其正念以正念然後能資其呪力歌讚必嚴其端誠以端誠然後能成其法會先事齋居以致潔畢會宴坐而如慕各盡虔恭方蒙饒益有情或不謹便成無利則弗為聖賢所祐且復有鬼神之譴敢告大衆其戒之哉斛前召請啓白蓋聞大圓鏡體磨而不磷涅而不淄如意珠王取之無禁用之無竭奈何衆生弱喪永劫陸沈黑山下頓足牽衣黃泉中安身立命慧光不燭飢火長然圓頓上乘可得而聞苦澀惡味備嘗不已方以類聚物以羣分其居也皆艱難險阻之鄉其黨也盡嫉妒慳貪之衆真鬼虎龍蛇之可畏如稻麻竹葦之良多賴法王留施食之緣幸施主奉如來之教時於清夜具展香羞惟鬼神自爾之力能周仗佛祖無緣之慈普攝我聞經説在昔阿難尊者獨居靜處念所受法則於深夜見一餓鬼名曰面然白阿難言卻後三日即便命終當墮鬼趣與我同類阿難聞已心生惶怖問餓鬼言若我死後生餓鬼者行何方便可得免脫爾時餓鬼白阿難言汝若能布施百千那由他恆河沙餓鬼并百千婆羅門仙等以摩伽他國之斛各施一斛飲食汝得增壽我得離苦阿難聞此不順之語身毛皆竪即至佛所具述此言世尊我今云何能辦若干鬼仙等食佛即為説無量威德自在光明勝妙力真言若誦此呪則能變少飲食令諸鬼仙一一皆得飽滿阿難依教行持得延壽命鬼得生天法門不唯益於現在亦欲遠被未來羅漢結集成文三藏傳來此土人到于今咸受其賜大矣哉是真不可思議博施濟衆之道也于夜蓋有清信檀那特為某事興建斛食今則食時斯屆供事當陳欲召來儀須伸迎請云云歐陽文忠公宿採石聞鬼聲歐陽文忠公修嘗宿採石渡夜聞呼聲曰去來舟尾有應之曰參政宿此不可去齋料幸擕歸公默念舟尾迫浦且無人必鬼也至五鼓又聞岸上獵獵馳驟聲舟尾者呼曰齋料如何岸上者且行且答曰道場不清淨皆無所得而歸公異其事後半月因遊金山寺以告長老長老曰昨有施主在寺修設方第二時法事其妻乳臥少頃鯹風滅燭時皆驚異不知是此否公問其日乃宿採石之夜其事驗矣見夷堅志佛印禪師加持水陸感驗佛印禪師了元世傳是樓至佛化身余未之信後閲師妙峯詩集及師銘果有其謂蓋師嘗訪大覺璉禪師未至前一日大覺忽夢樓至如來至遲明率衆迎候而師遽來璉公因作詩以贈目以樓至稱之而師又嘗自夢釋迦本師告之曰汝吾弟子乃賢劫千佛中最後樓至如來者是也夢覺遂成一偈有夢時雖説同樓至覺後依然箇比丘寄語釋迦千道伴遇抽頭處且抽頭之句又師住金山時有海賈到寺設水陸是夜適法事僧沿幹而出師不得已即自行總持此夜有漁舟泊于江湍深夜忽聞岸上有聲曰今夜金山水陸甚勝乃樓至如來自行加持也漁人審是鬼聲於師大生敬仰據斯顯驗則知人勝法勝乃感鬼神歡悅歆享矣誦破地獄偈感驗東坡大全云若人欲了知三世一切佛應觀法界性一切唯心造市人喪妻者夢其妻求破地獄偈覺而求之無有也問薦福古老云此偈是也遂舉家持誦後見亡者寶衣天冠縹眇空中稱謝而去軾聞之於佛印佛印聞之於范堯夫華嚴感應傳云垂拱三年華嚴藏法師往崇福寺見薦律師云今夏有賢安坊郭神亮入寺禮拜於余自言頃忽暴亡經于七日近得再蘇當時有使者三人追至平等王所王勘問罪福等事令使者引某至地獄忽逢一僧云我救汝苦汝但當受持一偈必脫此苦偈曰若人欲了知等神亮倉皇而誦方數十遍其與同罪者並得脫免當知此偈能破地獄也藏師云此偈乃華嚴經第四會中偈也薦公未之信乃請第十九卷看之果然乃覺林菩薩所説偈也纂靈記云昔京兆有人姓王氏失名暴死三日而再回去時被二使者追赴地獄偶見一僧自稱是地獄即令誦若人欲了知四句偈王急誦持聲所至處一切罪人悉皆脫去王既蘇即發願終身誦之復向道俗説此事以勸持誦時有一僧為撿經方知是華嚴偈也誦破地獄呪感驗昔峽石有一朝士姓徐氏失名徐氏長婦因病忽亡乃見一人身著王者之服形貌雄偉婦稽首拜問為誰王答曰吾是冥官緣汝家中大小每誦破地獄呪使冥中一切罪人皆得解脫汝有是功我特來報謝婦驚曰妾是凡賤豈當王者之至報謝王曰汝雖凡人他日舉家必生天是故吾之為報若是汝今已後當勿忘其呪也呪曰唵佉羅帝耶薩訶附録瑜伽集要焰口施食儀云面向東立瀉於壇前或淨地上或於石上或新淨瓦盆亦名于蘭盆生臺亦得或泉池江海長流水中不得瀉於石榴桃樹之下鬼神懼怕不得食之行事鈔云明出衆生食或在食前唱等得已出之或在食後經論無文隨情安置涅槃因曠野鬼為受不殺戒已告鬼言我今當敕聲聞弟子隨有佛法處悉施汝食若有住處不能施者即是天魔徒黨非我弟子四分僧伽藍中立鬼神廟屋傳云中國僧寺設鬼廟伽藍神廟賓頭盧廟每至二食皆僧家送三處食餘比丘不出愛道尼經令出如指甲大今有為亡人設食者依中含云若死人布施祭祀者若生入處餓鬼中者得餘處不得由各有活命食故雜含中廣明此事若親族不生入處中者但施心施其自得功德云云佛祖統紀云出生飯此有二緣一者涅槃經令施曠野鬼毗奈那律令施鬼子母等此曹本食肉啖人佛化之受戒不殺乃囑弟子隨處施食今齋堂各各出衆生食是也此唯出家人行之二者𦦨口經託阿難為緣令施餓鬼食今齋堂別具小斛於食畢衆作法施之或各具小生斛夜間呪施此通道族行之又云六道斛淨名經云以一食施一切言一切則全收六道供養諸佛及衆賢聖然後可食南嶽隨自意三昧云凡得食應云此食色香味上供十方佛中奉諸聖賢下及六道品等施無差楚宜反不齊也別天台觀心食法鳴鐘後斂手供養一體三寶次出生飯稱施六道此皆等供十界即是今人施六道修水陸供之明證也述曰妙樂云世人設六道者是梁武見江東多淫祀殺生命祭邪鬼乃以相似佛法權宜替之此蓋荊溪一往以祭祀惡法對佛法論之將以止天下之殺故未論十界等供之義𦦨口經令供養三寶即是四聖供婆羅門仙即是人道供𦦨口衆即是鬼道餘四道雖不備蓋是當時赴機未普故經文隱略耳若大乘行人圓觀法界則當依淨名經中義若慈雲謂鬼道得食餘五道不得者此等意亦是用婆娑論云若因祭祀唯鬼神得之餘趣不可盡得此是約人世祭祀言之耳若依出世法用平等心修無礙供則當仰觀淨名南嶽天台三處之文則理無不在今有營小斛曰散灑者或一巨斛者或至四十九斛者皆所以等供六道群品也可不信哉右數節文考閲之次録附于此更有施食念誦祕軌若欲修者須從師受凡諸真言神呪亦未經師受而誦則越諸佛三昧耶可慎也夫跋釋門施食難思之法也以呪持二七之數而謂能格六道四生之類以升合一器之微而謂能變四斛九斗之量以焦腹巨口之飢而謂能致甘美實腹之飽豈非難思之法耶難思如是而不示之以所可信行則其信愈難矣四明曉公廣披經教審知施食一法利濟尤多竊恐人多不知所自雖昭著典籍非會成一家則將泛然難考於是備録以為施食通覽遠從佛口親宣近自諸師輔贊以至加持響驗靡所不載一日携以見示師文沐手齋心讀之得未嘗見因念向之所信者今愈加信矣而人或未信者豈可無以開其深信耶遂捨家資普為有情命工刊行俾今見行者知所因依轉加精進其未嘗見者開發信心奉行勇猛庶幾自此人人樂於施食則三途八難飢火悉滅乘佛願力勝處託生其利豈不博哉開禧改元乙丑歲旦開封止菴林師文謹跋
